<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Game</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
        vertical-align: top;
      }
      #tap-start {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: clamp(0.875rem, 3.5vw, 1.125rem);
        letter-spacing: 0.06em;
        text-align: center;
        padding: 1rem;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game" aria-label="Game"></canvas>
    <div id="tap-start">TAP TO BEGIN · USE HEADPHONES</div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
